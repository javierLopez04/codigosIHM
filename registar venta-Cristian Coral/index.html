<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar venta</title>

<link rel="stylesheet" href="estilos.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<header>
Sistema de Inventario de farmacia
</header>

<div class="container">

<h2>Registrar venta</h2>
<div class="info">Factura N°: 000001</div>

<div class="row">

<div class="group">
<label>Fecha</label>
<input type="date">
</div>

<div class="group">
<label>Cliente</label>
<input type="text" value="Carlo Gonzales" disabled>
</div>

<div class="group">
<label>Método de pago</label>
<div class="payment">
<button class="pay-btn active">Efectivo</button>
<button class="pay-btn">Tarjeta</button>
</div>
</div>

</div>

<table>
<tr>
<th>Medicamento</th>
<th>Stock disponible</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Subtotal</th>
</tr>

<tr>
<td>Paracetamol 500mg</td>
<td>10</td>
<td>5</td>
<td>$3000</td>
<td>$15000</td>
</tr>

<tr>
<td>Ibuprofeno 400mg</td>
<td>7</td>
<td>3</td>
<td>$4000</td>
<td>$12000</td>
</tr>

<tr>
<td>Amoxicilina 500mg</td>
<td>8</td>
<td>2</td>
<td>$3000</td>
<td>$6000</td>
</tr>

</table>

<div class="total">
Subtotal: $33000 <br>
Descuento: $0 <br>
<strong>Total a pagar: $33000</strong>
</div>

<br>

<div class="actions">
<button class="cancel">Cancelar</button>

<div>
<button class="report">Generar reporte</button>
<button class="report">Exportar PDF</button>
</div>

<button class="finish">Finalizar venta</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
